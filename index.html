<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dot & Bar Sorting Modes</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 0;
  }

  #topBar {
    width: 100%;
    height: 50px;
    background: #222;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding-right: 20px;
    box-shadow: 0 0 10px #000;
  }

  #modeBtn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 15px;
  }

  #display {
    position: relative;
    width: 900px;
    height: 450px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    overflow: hidden;
    margin-bottom: 15px;
  }

  .dot {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: grab;
    border: 1px solid #00000055;
    box-shadow: 0 0 4px #000000aa;
    transition: background-color 0.2s;
  }

  .bar {
    position: absolute;
    background: #3b82f6;
    bottom: 0;
    width: 20px;
    transition: left 0.2s, height 0.2s, background-color 0.2s;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  button {
    padding: 6px 12px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    font-size: 14px;
  }

  input[type="color"] {
    width: 40px;
    height: 24px;
    border: none;
    background: transparent;
  }
</style>
</head>
<body>

<div id="topBar">
  <button id="modeBtn">Switch to Bar Mode</button>
</div>

<div id="container">

  <!-- DOT MODE CONTROLS -->
  <div id="dotControls" class="controls">
    <input type="color" id="colorPicker" value="#ff0000" />
    <button id="addDotBtn">Add Dot</button>
    <button id="autoBtn">Auto‑Generate</button>
    <button id="testBtn">Test Dots</button>
    <button id="sortBtn">Smart Hue Sort</button>
    <button id="stopBtn">Force Stop</button>
    <button id="deleteBtn">Delete All</button>
  </div>

  <!-- BAR MODE CONTROLS -->
  <div id="barControls" class="controls" style="display:none;">
    <button id="barGenerateBtn">Random Generate</button>
    <button id="barSortBtn">Sort Bars</button>
    <button id="barStopBtn">Force Stop</button>
    <button id="barBackBtn">Back to Dots</button>
  </div>

  <div id="display"></div>

</div>

<script>
/* ---------------------------------------------------------
   MODE SWITCHING
--------------------------------------------------------- */

let mode = "dots";

const modeBtn = document.getElementById("modeBtn");
const dotControls = document.getElementById("dotControls");
const barControls = document.getElementById("barControls");
const display = document.getElementById("display");

modeBtn.addEventListener("click", () => {
  if (mode === "dots") switchToBars();
  else switchToDots();
});

function switchToBars() {
  mode = "bars";
  modeBtn.textContent = "Switch to Dot Mode";
  dotControls.style.display = "none";
  barControls.style.display = "flex";
  clearDots();
}

function switchToDots() {
  mode = "dots";
  modeBtn.textContent = "Switch to Bar Mode";
  dotControls.style.display = "flex";
  barControls.style.display = "none";
  clearBars();
}

/* ---------------------------------------------------------
   DOT MODE (unchanged)
--------------------------------------------------------- */

let isSorting = false;
let sortInterval = null;

function clearDots() {
  display.innerHTML = "";
  isSorting = false;
  if (sortInterval) clearInterval(sortInterval);
}

function unlockUI() {
  addDotBtn.disabled = false;
  autoBtn.disabled = false;
  sortBtn.disabled = false;
  testBtn.disabled = false;
}

/* ---------------------------------------------------------
   BAR MODE
--------------------------------------------------------- */

let barSortInterval = null;
let bars = [];

function clearBars() {
  display.innerHTML = "";
  bars = [];
  if (barSortInterval) clearInterval(barSortInterval);
}

/* ---------------- RANDOM BAR GENERATION ---------------- */

const barGenerateBtn = document.getElementById("barGenerateBtn");

barGenerateBtn.addEventListener("click", () => {
  clearBars();

  const rect = display.getBoundingClientRect();

  const barWidth = 20;
  const barSpacing = 25;

  const count = Math.floor(rect.width / barSpacing);

  let usedHeights = new Set();

  for (let i = 0; i < count; i++) {
    let height;
    do {
      height = Math.floor(Math.random() * (rect.height - 50)) + 30;
    } while (usedHeights.has(height));

    usedHeights.add(height);

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = height + "px";
    bar.style.left = (i * barSpacing) + "px";

    bar.dataset.height = height;

    display.appendChild(bar);
    bars.push(bar);
  }
});

/* ---------------- BAR SORTING ---------------- */

const barSortBtn = document.getElementById("barSortBtn");
const barStopBtn = document.getElementById("barStopBtn");
const barBackBtn = document.getElementById("barBackBtn");

barSortBtn.addEventListener("click", () => {
  if (bars.length === 0) return;
  startBarSort();
});

barStopBtn.addEventListener("click", () => {
  if (barSortInterval) clearInterval(barSortInterval);
});

barBackBtn.addEventListener("click", () => {
  switchToDots();
});

/* ---------------- SORTING ALGORITHM ---------------- */

function startBarSort() {
  let i = 0;
  let j = 0;

  if (barSortInterval) clearInterval(barSortInterval);

  barSortInterval = setInterval(() => {

    bars.forEach(b => b.style.backgroundColor = "#3b82f6");

    if (i >= bars.length - 1) {
      clearInterval(barSortInterval);
      return;
    }

    const barA = bars[j];
    const barB = bars[j + 1];

    barA.style.backgroundColor = "#ff4444";

    if (parseInt(barA.dataset.height) > parseInt(barB.dataset.height)) {
      const tempLeft = barA.style.left;
      barA.style.left = barB.style.left;
      barB.style.left = tempLeft;

      bars[j] = barB;
      bars[j + 1] = barA;
    }

    j++;

    if (j >= bars.length - 1) {
      j = 0;
      i++;
    }

  }, 100);
}

</script>

</body>
</html>
