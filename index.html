<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color Physics Dots</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 10px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    align-items: center;
  }

  #display {
    position: relative;
    width: 800px;
    height: 400px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    overflow: hidden;
  }

  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: grab;
    border: 1px solid #00000055;
    box-shadow: 0 0 4px #000000aa;
    transition: background-color 0.2s;
  }

  button {
    padding: 6px 12px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    font-size: 14px;
  }

  button:disabled {
    background: #555;
    cursor: not-allowed;
  }

  input[type="color"] {
    border: none;
    width: 40px;
    height: 24px;
    padding: 0;
    background: transparent;
  }

  .status {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
  }

  .dot-color-picker {
    position: absolute;
    display: none;
  }
</style>
</head>
<body>

<h1>Color Physics Dots</h1>

<div class="controls">
  <label>
    <span>Dot color:</span>
    <input type="color" id="colorPicker" value="#ff0000" />
  </label>
  <button id="addDotBtn">Add Dot</button>
  <button id="sortBtn">Color Physics Sort</button>
</div>

<div id="display"></div>
<div class="status" id="status">
  Click dots to recolor. Drag them. Press "Color Physics Sort" to see colors attract / repel.
</div>

<script>
const display = document.getElementById("display");
const addDotBtn = document.getElementById("addDotBtn");
const sortBtn = document.getElementById("sortBtn");
const colorPicker = document.getElementById("colorPicker");
const status = document.getElementById("status");

let isSorting = false;
let sortInterval = null;

// Helpers
function getRandomPosition() {
  const rect = display.getBoundingClientRect();
  const size = 20;
  return {
    x: Math.random() * (rect.width - size),
    y: Math.random() * (rect.height - size)
  };
}

function setDotPosition(dot, x, y) {
  dot.style.left = x + "px";
  dot.style.top = y + "px";
  dot.dataset.x = x;
  dot.dataset.y = y;
}

function createDot(color) {
  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.backgroundColor = color;

  const pos = getRandomPosition();
  setDotPosition(dot, pos.x, pos.y);

  dot.dataset.x = pos.x;
  dot.dataset.y = pos.y;
  dot.dataset.color = color;

  enableDrag(dot);
  enableColorEdit(dot);

  display.appendChild(dot);
}

// Drag
function enableDrag(dot) {
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  dot.addEventListener("mousedown", (e) => {
    if (isSorting) return;
    dragging = true;
    dot.style.cursor = "grabbing";

    const rect = dot.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  });

  function move(e) {
    if (!dragging) return;

    const rect = display.getBoundingClientRect();
    const size = 20;

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    x = Math.max(0, Math.min(rect.width - size, x));
    y = Math.max(0, Math.min(rect.height - size, y));

    setDotPosition(dot, x, y);
  }

  function stop() {
    dragging = false;
    dot.style.cursor = "grab";
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
  }
}

// Recolor
function enableColorEdit(dot) {
  dot.addEventListener("click", (e) => {
    if (isSorting) return;

    const picker = document.createElement("input");
    picker.type = "color";
    picker.className = "dot-color-picker";
    picker.value = dot.dataset.color;

    picker.style.position = "fixed";
    picker.style.left = e.clientX + "px";
    picker.style.top = e.clientY + "px";

    document.body.appendChild(picker);
    picker.focus();
    picker.click();

    picker.addEventListener("input", () => {
      dot.style.backgroundColor = picker.value;
      dot.dataset.color = picker.value;
    });

    picker.addEventListener("blur", () => picker.remove());
  });
}

// Color distance (simple RGB)
function hexToRgb(hex) {
  hex = hex.replace("#", "");
  if (hex.length === 3) {
    hex = hex.split("").map(c => c + c).join("");
  }
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}

function colorDistance(c1, c2) {
  const a = hexToRgb(c1);
  const b = hexToRgb(c2);
  const dr = a.r - b.r;
  const dg = a.g - b.g;
  const db = a.b - b.b;
  return Math.sqrt(dr*dr + dg*dg + db*db);
}

// Physics sort: same colors attract, different repel
function startColorPhysicsSort() {
  const dots = Array.from(display.querySelectorAll(".dot"));
  if (dots.length < 2) {
    status.textContent = "Need at least 2 dots.";
    return;
  }

  isSorting = true;
  addDotBtn.disabled = true;
  sortBtn.disabled = true;
  status.textContent = "Color physics running...";

  const rect = display.getBoundingClientRect();
  const size = 20;
  const attractionStrength = 0.05;
  const repulsionStrength = 0.08;
  const maxStep = 3;

  if (sortInterval) clearInterval(sortInterval);

  sortInterval = setInterval(() => {
    let totalMovement = 0;

    for (let i = 0; i < dots.length; i++) {
      const dotA = dots[i];
      let ax = parseFloat(dotA.dataset.x);
      let ay = parseFloat(dotA.dataset.y);
      const colorA = dotA.dataset.color;

      let fx = 0;
      let fy = 0;

      for (let j = 0; j < dots.length; j++) {
        if (i === j) continue;
        const dotB = dots[j];
        const bx = parseFloat(dotB.dataset.x);
        const by = parseFloat(dotB.dataset.y);
        const colorB = dotB.dataset.color;

        let dx = bx - ax;
        let dy = by - ay;
        let dist = Math.sqrt(dx*dx + dy*dy) || 0.001;

        const cd = colorDistance(colorA, colorB);

        // Same color (small color distance) → attraction
        // Different color (large color distance) → repulsion
        const similarity = 1 - (cd / 441.67); // max RGB distance ~441.67
        const attract = Math.max(similarity, 0);
        const repel = Math.max(1 - similarity, 0);

        // Normalize direction
        dx /= dist;
        dy /= dist;

        // Attraction pulls towards B
        fx += dx * attractionStrength * attract;
        fy += dy * attractionStrength * attract;

        // Repulsion pushes away from B
        fx -= dx * repulsionStrength * repel;
        fy -= dy * repulsionStrength * repel;
      }

      // Apply force
      let newX = ax + Math.max(-maxStep, Math.min(maxStep, fx * 50));
      let newY = ay + Math.max(-maxStep, Math.min(maxStep, fy * 50));

      // Clamp
      newX = Math.max(0, Math.min(rect.width - size, newX));
      newY = Math.max(0, Math.min(rect.height - size, newY));

      totalMovement += Math.abs(newX - ax) + Math.abs(newY - ay);
      setDotPosition(dotA, newX, newY);
    }

    // Stop when system stabilizes
    if (totalMovement < 0.5) {
      clearInterval(sortInterval);
      isSorting = false;
      addDotBtn.disabled = false;
      sortBtn.disabled = false;
      status.textContent = "Color physics settled. Colors clustered, opposites pushed apart.";
    }
  }, 40);
}

// Events
addDotBtn.addEventListener("click", () => {
  createDot(colorPicker.value);
});

sortBtn.addEventListener("click", () => {
  if (!isSorting) startColorPhysicsSort();
});
</script>

</body>
</html>
