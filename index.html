<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bar Sorting Mode Only</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 0;
  }

  #topBar {
    width: 100%;
    height: 50px;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 10px #000;
  }

  #topBar button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin: 0 10px;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 15px;
  }

  #display {
    position: relative;
    width: 900px;
    height: 450px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    overflow: hidden;
    margin-bottom: 15px;
  }

  .bar {
    position: absolute;
    bottom: 0;
    width: 20px;
    transition: left 0.2s, height 0.2s, background-color 0.2s;
  }
</style>
</head>
<body>

<div id="topBar">
  <button id="barGenerateBtn">Random Generate</button>
  <button id="barSortBtn">Sort Bars</button>
  <button id="barStopBtn">Force Stop</button>
</div>

<div id="container">
  <div id="display"></div>
</div>

<script>
/* ---------------------------------------------------------
   BAR MODE ONLY
--------------------------------------------------------- */

let bars = [];
let barSortInterval = null;

const display = document.getElementById("display");
const barGenerateBtn = document.getElementById("barGenerateBtn");
const barSortBtn = document.getElementById("barSortBtn");
const barStopBtn = document.getElementById("barStopBtn");

/* ---------------- CLEAR BARS ---------------- */

function clearBars() {
  display.innerHTML = "";
  bars = [];
  if (barSortInterval) clearInterval(barSortInterval);
}

/* ---------------- RANDOM COLOR ---------------- */

function randomColor() {
  const r = Math.floor(Math.random() * 256);
  const g = Math.floor(Math.random() * 256);
  const b = Math.floor(Math.random() * 256);
  return `rgb(${r},${g},${b})`;
}

/* ---------------- BRIGHTNESS ---------------- */

function getBrightness(rgbString) {
  const nums = rgbString.match(/\d+/g).map(Number);
  const [r, g, b] = nums;
  return 0.2126*r + 0.7152*g + 0.0722*b;
}

/* ---------------- RANDOM BAR GENERATION ---------------- */

barGenerateBtn.addEventListener("click", () => {
  clearBars();

  const rect = display.getBoundingClientRect();

  const barWidth = 20;
  const barSpacing = 25;

  const count = Math.floor(rect.width / barSpacing);

  let usedHeights = new Set();

  for (let i = 0; i < count; i++) {

    let height;
    do {
      height = Math.floor(Math.random() * (rect.height - 50)) + 30;
    } while (usedHeights.has(height));

    usedHeights.add(height);

    const color = randomColor();
    const brightness = getBrightness(color);

    const bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = height + "px";
    bar.style.left = (i * barSpacing) + "px";
    bar.style.backgroundColor = color;

    bar.dataset.height = height;
    bar.dataset.brightness = brightness;

    display.appendChild(bar);
    bars.push(bar);
  }
});

/* ---------------- SORTING ---------------- */

barSortBtn.addEventListener("click", () => {
  if (bars.length === 0) return;
  startBarSort();
});

barStopBtn.addEventListener("click", () => {
  if (barSortInterval) clearInterval(barSortInterval);
});

/* ---------------- SORTING ALGORITHM ---------------- */

function startBarSort() {
  let i = 0;
  let j = 0;

  if (barSortInterval) clearInterval(barSortInterval);

  barSortInterval = setInterval(() => {

    bars.forEach(b => b.style.backgroundColor = b.dataset.originalColor || b.style.backgroundColor);

    if (i >= bars.length - 1) {
      clearInterval(barSortInterval);
      return;
    }

    const barA = bars[j];
    const barB = bars[j + 1];

    barA.style.backgroundColor = "#ff4444";

    const heightA = parseInt(barA.dataset.height);
    const heightB = parseInt(barB.dataset.height);

    const brightA = parseFloat(barA.dataset.brightness);
    const brightB = parseFloat(barB.dataset.brightness);

    const shouldSwap =
      heightA > heightB ||
      (heightA === heightB && brightA > brightB);

    if (shouldSwap) {
      const tempLeft = barA.style.left;
      barA.style.left = barB.style.left;
      barB.style.left = tempLeft;

      bars[j] = barB;
      bars[j + 1] = barA;
    }

    j++;

    if (j >= bars.length - 1) {
      j = 0;
      i++;
    }

  }, 100);
}

</script>

</body>
</html>
