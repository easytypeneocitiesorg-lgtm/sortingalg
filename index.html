<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fast Height Sorting Bars</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 0;
  }

  #topBar {
    width: 100%;
    height: 50px;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 10px #000;
  }

  #topBar button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin: 0 10px;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 15px;
  }

  #display {
    position: relative;
    width: 900px;
    height: 450px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    overflow: hidden;
    margin-bottom: 15px;
  }

  .bar {
    position: absolute;
    bottom: 0;
    width: 20px;
    transition: left 0.05s, height 0.05s, background-color 0.05s;
  }
</style>
</head>
<body>

<div id="topBar">
  <button id="barGenerateBtn">Random Generate</button>
  <button id="barSortBtn">Sort Bars</button>
  <button id="barStopBtn">Force Stop</button>
</div>

<div id="container">
  <div id="display"></div>
</div>

<script>
let bars = [];
let barSortInterval = null;

const display = document.getElementById("display");
const barGenerateBtn = document.getElementById("barGenerateBtn");
const barSortBtn = document.getElementById("barSortBtn");
const barStopBtn = document.getElementById("barStopBtn");

function clearBars() {
  display.innerHTML = "";
  bars = [];
  if (barSortInterval) clearInterval(barSortInterval);
}

barGenerateBtn.addEventListener("click", () => {
  clearBars();

  const rect = display.getBoundingClientRect();

  const barWidth = 20;
  const barSpacing = 25;

  const count = Math.floor(rect.width / barSpacing);

  let usedHeights = new Set();

  for (let i = 0; i < count; i++) {

    let height;
    do {
      height = Math.floor(Math.random() * (rect.height - 50)) + 30;
    } while (usedHeights.has(height));

    usedHeights.add(height);

    const bar = document.createElement("div");
    bar.className = "bar";

    bar.style.width = barWidth + "px";
    bar.style.height = height + "px";
    bar.style.left = (i * barSpacing) + "px";

    // OG BLUE COLOR
    bar.style.backgroundColor = "#3b82f6";
    bar.dataset.originalColor = "#3b82f6";

    bar.dataset.height = height;

    display.appendChild(bar);
    bars.push(bar);
  }
});

barSortBtn.addEventListener("click", () => {
  if (bars.length === 0) return;
  startHeightSort();
});

barStopBtn.addEventListener("click", () => {
  if (barSortInterval) clearInterval(barSortInterval);
});

function startHeightSort() {
  let i = 0;
  let j = 0;

  if (barSortInterval) clearInterval(barSortInterval);

  barSortInterval = setInterval(() => {

    // Reset all bars to original blue
    bars.forEach(b => b.style.backgroundColor = b.dataset.originalColor);

    if (i >= bars.length - 1) {
      clearInterval(barSortInterval);
      return;
    }

    const barA = bars[j];
    const barB = bars[j + 1];

    // Highlight = red
    barA.style.backgroundColor = "red";

    const heightA = parseInt(barA.dataset.height);
    const heightB = parseInt(barB.dataset.height);

    const shouldSwap = heightA > heightB;

    if (shouldSwap) {
      const tempLeft = barA.style.left;
      barA.style.left = barB.style.left;
      barB.style.left = tempLeft;

      bars[j] = barB;
      bars[j + 1] = barA;
    }

    j++;

    if (j >= bars.length - 1) {
      j = 0;
      i++;
    }

  }, 10); // FAST SPEED
}

</script>

</body>
</html>
