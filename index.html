<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hue Smart Sorting Dots</title>

<style>

body {
  font-family: system-ui, sans-serif;
  background: #111;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
}


#display {
  position: relative;
  width: 900px;
  height: 450px;
  border: 2px solid #444;
  border-radius: 8px;
  background: #1a1a1a;
  overflow: hidden;
}


.dot {
  position: absolute;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: grab;
  border: 1px solid #0008;
  box-shadow: 0 0 4px #000;
}


button {
  padding: 6px 12px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  background: #3b82f6;
  color: white;
}


.controls {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}


input[type="color"] {
  width:40px;
  height:24px;
}


</style>
</head>


<body>


<h1>Hue Smart Sorting Dots</h1>


<div class="controls">

<input type="color" id="colorPicker" value="#ff0000">

<button id="addDotBtn">Add Dot</button>
<button id="autoBtn">Auto-Generate</button>
<button id="testBtn">Test Dots</button>
<button id="sortBtn">Smart Hue Sort</button>
<button id="stopBtn">Force Stop</button>
<button id="deleteBtn">Delete All</button>

</div>


<div id="display"></div>



<script>


const display=document.getElementById("display");


const addDotBtn=document.getElementById("addDotBtn");
const autoBtn=document.getElementById("autoBtn");
const testBtn=document.getElementById("testBtn");
const sortBtn=document.getElementById("sortBtn");
const stopBtn=document.getElementById("stopBtn");
const deleteBtn=document.getElementById("deleteBtn");
const colorPicker=document.getElementById("colorPicker");


let isSorting=false;
let sortInterval=null;



// ---------------- COLOR ----------------


function hexToHue(hex){

hex=hex.replace("#","");


let r=parseInt(hex.substring(0,2),16)/255;
let g=parseInt(hex.substring(2,4),16)/255;
let b=parseInt(hex.substring(4,6),16)/255;


let max=Math.max(r,g,b);
let min=Math.min(r,g,b);


let h=0;


if(max===min)
h=0;

else if(max===r)
h=(60*((g-b)/(max-min))+360)%360;

else if(max===g)
h=60*((b-r)/(max-min))+120;

else
h=60*((r-g)/(max-min))+240;


return h;

}



function hexToRgb(hex){

hex=hex.replace("#","");


return {

r:parseInt(hex.substring(0,2),16),
g:parseInt(hex.substring(2,4),16),
b:parseInt(hex.substring(4,6),16)

};

}



function isGrayscale(hex){

let rgb=hexToRgb(hex);


let max=Math.max(rgb.r,rgb.g,rgb.b);
let min=Math.min(rgb.r,rgb.g,rgb.b);


return ((max-min)/(max||1))<0.08;

}




function randomColor(){

return "#"+Math.floor(Math.random()*16777215)
.toString(16)
.padStart(6,"0");

}





// ---------------- POSITION ----------------


function getRandomPosition(){

let rect=display.getBoundingClientRect();


return {

x:Math.random()*(rect.width-22),
y:Math.random()*(rect.height-22)

};

}




function setDotPosition(dot,x,y){

dot.style.left=x+"px";
dot.style.top=y+"px";


dot.dataset.x=x;
dot.dataset.y=y;

}





// ---------------- CREATE DOT ----------------


function createDot(color){


let dot=document.createElement("div");


dot.className="dot";


dot.style.backgroundColor=color;


let pos=getRandomPosition();


setDotPosition(dot,pos.x,pos.y);



dot.dataset.color=color;
dot.dataset.hue=hexToHue(color);


dot.dataset.vx=0;
dot.dataset.vy=0;



// used for grayscale sorting

dot.dataset.grayOffset=
(Math.random()*100)-50;



// target position

dot.dataset.targetX=0;
dot.dataset.targetY=0;


// anti-stuck tracking

dot.dataset.lastDistance=9999;
dot.dataset.stuck=0;



enableDrag(dot);
enableColorEdit(dot);


display.appendChild(dot);


}





// ---------------- DRAG ----------------


function enableDrag(dot){

let dragging=false;
let offsetX=0;
let offsetY=0;



dot.addEventListener("mousedown",e=>{


if(isSorting)
return;


dragging=true;


let rect=dot.getBoundingClientRect();


offsetX=e.clientX-rect.left;
offsetY=e.clientY-rect.top;



document.addEventListener("mousemove",move);
document.addEventListener("mouseup",stop);



});



function move(e){


if(!dragging)
return;


let rect=display.getBoundingClientRect();



let x=e.clientX-rect.left-offsetX;
let y=e.clientY-rect.top-offsetY;



x=Math.max(0,Math.min(rect.width-22,x));
y=Math.max(0,Math.min(rect.height-22,y));



setDotPosition(dot,x,y);



}




function stop(){


dragging=false;


document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",stop);


}


}
// ---------------- COLOR EDIT ----------------


function enableColorEdit(dot){

dot.addEventListener("click",e=>{


if(isSorting)
return;



let picker=document.createElement("input");


picker.type="color";
picker.value=dot.dataset.color;


picker.style.position="fixed";
picker.style.left=e.clientX+"px";
picker.style.top=e.clientY+"px";



document.body.appendChild(picker);


picker.click();



picker.addEventListener("input",()=>{


dot.style.backgroundColor=picker.value;


dot.dataset.color=picker.value;


dot.dataset.hue=hexToHue(picker.value);



});



picker.addEventListener("blur",()=>{

picker.remove();

});



});


}







// ---------------- SMART PHYSICS SORT ----------------


function startSmartHueSort(){


const dots=Array.from(
display.querySelectorAll(".dot")
);



if(dots.length<2)
return;



isSorting=true;



addDotBtn.disabled=true;
autoBtn.disabled=true;
sortBtn.disabled=true;
testBtn.disabled=true;



const rect=display.getBoundingClientRect();




// Sort by hue

dots.sort((a,b)=>{

return parseFloat(a.dataset.hue)-
parseFloat(b.dataset.hue);

});





// Give every dot its own destination


dots.forEach((dot,index)=>{


let x;


if(isGrayscale(dot.dataset.color)){


x=(rect.width/2)+
parseFloat(dot.dataset.grayOffset);


}

else{


x=40+
(index/(dots.length-1))*
(rect.width-80);


}



dot.dataset.targetX=x;
dot.dataset.targetY=rect.height/2;



dot.dataset.locked="false";

dot.dataset.lastDistance=99999;
dot.dataset.stuck=0;



});





if(sortInterval)
clearInterval(sortInterval);





sortInterval=setInterval(()=>{


let totalMotion=0;



for(let i=0;i<dots.length;i++){



let A=dots[i];


let x=parseFloat(A.dataset.x);
let y=parseFloat(A.dataset.y);



let vx=parseFloat(A.dataset.vx);
let vy=parseFloat(A.dataset.vy);



let targetX=parseFloat(A.dataset.targetX);
let targetY=parseFloat(A.dataset.targetY);




let fx=0;
let fy=0;





// Pull toward assigned target


let targetDx=targetX-x;
let targetDy=targetY-y;



let targetDistance=
Math.sqrt(
targetDx*targetDx+
targetDy*targetDy
);



if(A.dataset.locked==="false"){


fx+=targetDx*0.012;
fy+=targetDy*0.012;


}





// ---------------- COLLISION NAVIGATION ----------------



for(let j=0;j<dots.length;j++){


if(i===j)
continue;



let B=dots[j];


let bx=parseFloat(B.dataset.x);
let by=parseFloat(B.dataset.y);



let dx=x-bx;
let dy=y-by;



let dist=Math.sqrt(dx*dx+dy*dy);



let minDist=30;



if(dist<minDist){


if(dist===0)
dist=0.01;



let nx=dx/dist;
let ny=dy/dist;



let overlap=minDist-dist;



// Push away


fx+=nx*overlap*0.45;
fy+=ny*overlap*0.45;




// Sideways steering to go around


let sideX=-ny;
let sideY=nx;



let sideDirection=
(targetDx*sideX+
targetDy*sideY);



if(sideDirection<0){

sideX=-sideX;
sideY=-sideY;

}



fx+=sideX*overlap*0.35;
fy+=sideY*overlap*0.35;



}


}





// ---------------- ANTI STUCK ----------------



let oldDistance=
parseFloat(A.dataset.lastDistance);



if(targetDistance >= oldDistance-0.1){

A.dataset.stuck=
parseInt(A.dataset.stuck)+1;


}
else{


A.dataset.stuck=0;


}



A.dataset.lastDistance=targetDistance;




// If trapped, force an escape direction


if(parseInt(A.dataset.stuck)>20){


fx+=(Math.random()-0.5)*1.5;
fy+=(Math.random()-0.5)*1.5;


A.dataset.stuck=0;


}





// ---------------- APPLY PHYSICS ----------------



vx+=fx;
vy+=fy;



// friction

vx*=0.82;
vy*=0.82;



// speed limit

let speed=Math.sqrt(vx*vx+vy*vy);



if(speed>6){


vx=(vx/speed)*6;
vy=(vy/speed)*6;


}





let newX=x+vx;
let newY=y+vy;




// boundaries


newX=Math.max(
0,
Math.min(rect.width-22,newX)
);


newY=Math.max(
0,
Math.min(rect.height-22,newY)
);





// Lock when close enough


if(
targetDistance<1.5 &&
Math.abs(vx)<0.1 &&
Math.abs(vy)<0.1
){


newX=targetX;
newY=targetY;


vx=0;
vy=0;


A.dataset.locked="true";


}




A.dataset.vx=vx;
A.dataset.vy=vy;



setDotPosition(A,newX,newY);



totalMotion+=
Math.abs(vx)+Math.abs(vy);



}





// stop condition


let finished=dots.every(
d=>d.dataset.locked==="true"
);



if(finished || totalMotion<0.04){


clearInterval(sortInterval);


isSorting=false;


dots.forEach(d=>{

d.dataset.vx=0;
d.dataset.vy=0;

});


unlockUI();


}



},30);



}





// ---------------- GENERATION ----------------


function autoGenerateDots(count=40){


for(let i=0;i<count;i++){

createDot(randomColor());

}


}
// ---------------- UI ----------------


function unlockUI(){

addDotBtn.disabled=false;
autoBtn.disabled=false;
sortBtn.disabled=false;
testBtn.disabled=false;

}





// Force stop

stopBtn.addEventListener("click",()=>{


if(sortInterval)
clearInterval(sortInterval);


isSorting=false;


unlockUI();


});






// Delete all

deleteBtn.addEventListener("click",()=>{


if(sortInterval)
clearInterval(sortInterval);



isSorting=false;


display.innerHTML="";


unlockUI();


});







// ---------------- TEST DOTS ----------------


testBtn.addEventListener("click",()=>{


const colors=[

"#ff0000",
"#ff7f00",
"#ffff00",
"#00ff00",
"#00ffff",
"#0000ff",
"#8000ff",
"#ff00ff",
"#ffffff",
"#888888",
"#000000"

];



colors.forEach(color=>{

createDot(color);

});


});







// ---------------- BUTTON EVENTS ----------------



addDotBtn.addEventListener("click",()=>{


createDot(colorPicker.value);


});






autoBtn.addEventListener("click",()=>{


autoGenerateDots(40);


});







sortBtn.addEventListener("click",()=>{


if(!isSorting){

startSmartHueSort();

}


});



</script>

</body>
</html>
