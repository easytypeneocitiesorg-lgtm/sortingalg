<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color Physics Dots</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  #display {
    position: relative;
    width: 800px;
    height: 400px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    overflow: hidden;
  }

  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: grab;
    border: 1px solid #00000055;
    box-shadow: 0 0 4px #000000aa;
    transition: background-color 0.2s;
  }

  button {
    padding: 6px 12px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    font-size: 14px;
  }

  input[type="color"] {
    width: 40px;
    height: 24px;
    border: none;
    background: transparent;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
</style>
</head>
<body>

<h1>Color Physics Dots</h1>

<div class="controls">
  <input type="color" id="colorPicker" value="#ff0000" />
  <button id="addDotBtn">Add Dot</button>
  <button id="autoBtn">Auto‑Generate</button>
  <button id="sortBtn">Color Physics Sort</button>
</div>

<div id="display"></div>

<script>
const display = document.getElementById("display");
const addDotBtn = document.getElementById("addDotBtn");
const autoBtn = document.getElementById("autoBtn");
const sortBtn = document.getElementById("sortBtn");
const colorPicker = document.getElementById("colorPicker");

let isSorting = false;
let sortInterval = null;

// Random position
function getRandomPosition() {
  const rect = display.getBoundingClientRect();
  return {
    x: Math.random() * (rect.width - 20),
    y: Math.random() * (rect.height - 20)
  };
}

// Random color
function randomColor() {
  return "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");
}

// Set dot position
function setDotPosition(dot, x, y) {
  dot.style.left = x + "px";
  dot.style.top = y + "px";
  dot.dataset.x = x;
  dot.dataset.y = y;
}

// Create dot
function createDot(color) {
  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.backgroundColor = color;

  const pos = getRandomPosition();
  setDotPosition(dot, pos.x, pos.y);

  dot.dataset.color = color;
  dot.dataset.vx = 0;
  dot.dataset.vy = 0;

  enableDrag(dot);
  enableColorEdit(dot);

  display.appendChild(dot);
}

// Dragging
function enableDrag(dot) {
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  dot.addEventListener("mousedown", (e) => {
    if (isSorting) return;
    dragging = true;

    const rect = dot.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  });

  function move(e) {
    if (!dragging) return;

    const rect = display.getBoundingClientRect();
    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    x = Math.max(0, Math.min(rect.width - 20, x));
    y = Math.max(0, Math.min(rect.height - 20, y));

    setDotPosition(dot, x, y);
  }

  function stop() {
    dragging = false;
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
  }
}

// Recoloring
function enableColorEdit(dot) {
  dot.addEventListener("click", (e) => {
    if (isSorting) return;

    const picker = document.createElement("input");
    picker.type = "color";
    picker.value = dot.dataset.color;

    picker.style.position = "fixed";
    picker.style.left = e.clientX + "px";
    picker.style.top = e.clientY + "px";

    document.body.appendChild(picker);
    picker.click();

    picker.addEventListener("input", () => {
      dot.style.backgroundColor = picker.value;
      dot.dataset.color = picker.value;
    });

    picker.addEventListener("blur", () => picker.remove());
  });
}

// Color distance (normalized)
function hexToRgb(hex) {
  hex = hex.replace("#", "");
  const num = parseInt(hex, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}

function colorDistance(c1, c2) {
  const a = hexToRgb(c1);
  const b = hexToRgb(c2);
  const dr = a.r - b.r;
  const dg = a.g - b.g;
  const db = a.b - b.b;
  return Math.sqrt(dr*dr + dg*dg + db*db) / 441.67;
}

// Physics sort with collisions
function startColorPhysicsSort() {
  const dots = Array.from(display.querySelectorAll(".dot"));
  if (dots.length < 2) return;

  isSorting = true;
  addDotBtn.disabled = true;
  autoBtn.disabled = true;
  sortBtn.disabled = true;

  const rect = display.getBoundingClientRect();

  if (sortInterval) clearInterval(sortInterval);

  sortInterval = setInterval(() => {
    let movement = 0;

    for (let i = 0; i < dots.length; i++) {
      const A = dots[i];
      let ax = parseFloat(A.dataset.x);
      let ay = parseFloat(A.dataset.y);
      let vx = parseFloat(A.dataset.vx);
      let vy = parseFloat(A.dataset.vy);

      const colorA = A.dataset.color;

      let fx = 0;
      let fy = 0;

      for (let j = 0; j < dots.length; j++) {
        if (i === j) continue;

        const B = dots[j];
        const bx = parseFloat(B.dataset.x);
        const by = parseFloat(B.dataset.y);
        const colorB = B.dataset.color;

        let dx = bx - ax;
        let dy = by - ay;
        let dist = Math.sqrt(dx*dx + dy*dy) || 0.001;

        const ndx = dx / dist;
        const ndy = dy / dist;

        const cd = colorDistance(colorA, colorB);
        const attract = (1 - cd) * (1 / dist);
        const repel = cd * (1 / (dist * dist));

        fx += ndx * (attract - repel);
        fy += ndy * (attract - repel);

        // Collision
        const minDist = 20;
        if (dist < minDist) {
          const overlap = minDist - dist;

          fx -= ndx * overlap * 0.2;
          fy -= ndy * overlap * 0.2;

          vx -= ndx * overlap * 0.1;
          vy -= ndy * overlap * 0.1;
        }
      }

      vx += fx * 0.5;
      vy += fy * 0.5;

      vx *= 0.85;
      vy *= 0.85;

      let newX = ax + vx;
      let newY = ay + vy;

      newX = Math.max(0, Math.min(rect.width - 20, newX));
      newY = Math.max(0, Math.min(rect.height - 20, newY));

      movement += Math.abs(newX - ax) + Math.abs(newY - ay);

      A.dataset.vx = vx;
      A.dataset.vy = vy;

      setDotPosition(A, newX, newY);
    }

    if (movement < 0.3) {
      clearInterval(sortInterval);
      isSorting = false;
      addDotBtn.disabled = false;
      autoBtn.disabled = false;
      sortBtn.disabled = false;
    }
  }, 40);
}

// Auto-generate random dots
function autoGenerateDots(count = 40) {
  for (let i = 0; i < count; i++) {
    createDot(randomColor());
  }
}

// Events
addDotBtn.addEventListener("click", () => {
  createDot(colorPicker.value);
});

autoBtn.addEventListener("click", () => {
  autoGenerateDots(40);
});

sortBtn.addEventListener("click", () => {
  if (!isSorting) startColorPhysicsSort();
});
</script>

</body>
</html>
