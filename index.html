<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dot Color Sorter</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 10px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    align-items: center;
  }

  #display {
    position: relative;
    width: 800px;
    height: 400px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1a1a1a;
    overflow: hidden;
  }

  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: grab;
    border: 1px solid #00000055;
    box-shadow: 0 0 4px #000000aa;
    transition: left 0.15s linear, top 0.15s linear, background-color 0.2s;
  }

  button {
    padding: 6px 12px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    font-size: 14px;
  }

  button:disabled {
    background: #555;
    cursor: not-allowed;
  }

  input[type="color"] {
    border: none;
    width: 40px;
    height: 24px;
    padding: 0;
    background: transparent;
  }

  .status {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
  }

  /* Hidden color picker for editing dots */
  .dot-color-picker {
    position: absolute;
    display: none;
  }
</style>
</head>
<body>

<h1>Dot Color Sorter</h1>

<div class="controls">
  <label>
    <span>Dot color:</span>
    <input type="color" id="colorPicker" value="#ff0000" />
  </label>
  <button id="addDotBtn">Add Dot</button>
  <button id="sortBtn">Sort By Color</button>
</div>

<div id="display"></div>
<div class="status" id="status">Click dots to recolor them. Drag them around. Press Sort.</div>

<script>
const display = document.getElementById("display");
const addDotBtn = document.getElementById("addDotBtn");
const sortBtn = document.getElementById("sortBtn");
const colorPicker = document.getElementById("colorPicker");
const status = document.getElementById("status");

let isSorting = false;

// Random position inside display
function getRandomPosition() {
  const rect = display.getBoundingClientRect();
  const size = 20;
  return {
    x: Math.random() * (rect.width - size),
    y: Math.random() * (rect.height - size)
  };
}

// Create dot
function createDot(color) {
  const dot = document.createElement("div");
  dot.className = "dot";
  dot.style.backgroundColor = color;

  const pos = getRandomPosition();
  setDotPosition(dot, pos.x, pos.y);

  dot.dataset.x = pos.x;
  dot.dataset.y = pos.y;
  dot.dataset.color = color;

  enableDrag(dot);
  enableColorEdit(dot);

  display.appendChild(dot);
}

// Set dot position
function setDotPosition(dot, x, y) {
  dot.style.left = x + "px";
  dot.style.top = y + "px";
  dot.dataset.x = x;
  dot.dataset.y = y;
}

// Drag-and-drop
function enableDrag(dot) {
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  dot.addEventListener("mousedown", (e) => {
    if (isSorting) return;
    dragging = true;
    dot.style.cursor = "grabbing";

    const rect = dot.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
  });

  function move(e) {
    if (!dragging) return;

    const rect = display.getBoundingClientRect();
    const size = 20;

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    x = Math.max(0, Math.min(rect.width - size, x));
    y = Math.max(0, Math.min(rect.height - size, y));

    setDotPosition(dot, x, y);
  }

  function stop() {
    dragging = false;
    dot.style.cursor = "grab";
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
  }
}

// Allow recoloring dots
function enableColorEdit(dot) {
  dot.addEventListener("click", (e) => {
    if (isSorting) return;

    const picker = document.createElement("input");
    picker.type = "color";
    picker.className = "dot-color-picker";

    picker.style.left = e.clientX + "px";
    picker.style.top = e.clientY + "px";
    picker.value = dot.dataset.color;

    document.body.appendChild(picker);
    picker.click();

    picker.addEventListener("input", () => {
      dot.style.backgroundColor = picker.value;
      dot.dataset.color = picker.value;
    });

    picker.addEventListener("blur", () => picker.remove());
  });
}

// Sort dots by color groups
function sortDotsByColor() {
  const dots = Array.from(display.querySelectorAll(".dot"));
  if (dots.length < 2) {
    status.textContent = "Need at least 2 dots.";
    return;
  }

  isSorting = true;
  addDotBtn.disabled = true;
  sortBtn.disabled = true;
  status.textContent = "Sorting by color...";

  // Group dots by color
  const groups = {};
  dots.forEach(dot => {
    const c = dot.dataset.color;
    if (!groups[c]) groups[c] = [];
    groups[c].push(dot);
  });

  // Flatten groups in consistent order
  const sorted = Object.keys(groups).sort().flatMap(color => groups[color]);

  // Animate sorting by assigning new X positions
  let index = 0;
  const spacing = 30;

  const interval = setInterval(() => {
    if (index >= sorted.length) {
      clearInterval(interval);
      isSorting = false;
      addDotBtn.disabled = false;
      sortBtn.disabled = false;
      status.textContent = "Sorting complete.";
      return;
    }

    const dot = sorted[index];
    const newX = index * spacing;
    const newY = parseFloat(dot.dataset.y);

    setDotPosition(dot, newX, newY);

    index++;
  }, 120);
}

// Events
addDotBtn.addEventListener("click", () => {
  createDot(colorPicker.value);
});

sortBtn.addEventListener("click", () => {
  if (!isSorting) sortDotsByColor();
});
</script>

</body>
</html>
